<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kampon Graphics - Booking</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับแจ้งเตือน -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Font - Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        /* ดักป้องกัน input type="date" และ "time" ขยายเกินขอบใน iOS */
        input[type="date"], input[type="time"] {
            min-width: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <!-- Container สีขาวมินิมอล บล็อกความกว้างปลอดภัย -->
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-5 sm:p-6 shadow-sm overflow-hidden box-border">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-semibold text-gray-900 tracking-wide">KAMPON GRAPHICS</h2>
            <p class="text-gray-500 text-xs mt-1">ระบบจองคิวงานและแนบสลิปมัดจำ</p>
        </div>

        <!-- Form -->
        <form id="bookingForm" class="space-y-4 max-w-full block">
            
            <!-- ชื่อ-นามสกุล -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">ชื่อ-นามสกุล</label>
                <input type="text" id="name" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border" placeholder="สมชาย ใจดี">
            </div>

            <!-- เบอร์โทรศัพท์ -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border" placeholder="089XXXXXXX">
            </div>

            <!-- ประเภทงาน -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">ประเภทงานที่ต้องการสั่ง / ถ่ายภาพ</label>
                <input type="text" id="service" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border" placeholder="">
            </div>

            <!-- รายละเอียดงานเพิ่มเติม -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">รายละเอียดงานเพิ่มเติม</label>
                <textarea id="details" rows="3" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors resize-none box-border" placeholder="ระบุบรีฟงานหรือรายละเอียดเพิ่มเติม..."></textarea>
            </div>

            <!-- วันที่และเวลา (ปรับโครงสร้างป้องกันการดันขอบทะลุ) -->
            <div class="grid grid-cols-1 gap-4 w-full box-border">
                <div class="w-full max-w-full">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">วันที่จอง</label>
                    <input type="date" id="date" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border">
                </div>
                <div class="w-full max-w-full">
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">เวลา</label>
                    <input type="time" id="time" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border">
                </div>
            </div>

            <!-- ยอดมัดจำ -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">จำนวนเงินมัดจำ (บาท)</label>
                <input type="number" id="deposit" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-gray-500 focus:bg-white transition-colors box-border" placeholder="">
            </div>

            <!-- แนบสลิป -->
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">แนบภาพสลิปการโอนเงิน</label>
                <div class="border border-gray-300 border-dashed rounded-xl p-3 bg-gray-50 box-border w-full overflow-hidden">
                    <input type="file" id="slip" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-2 file:py-2 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-medium file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 file:cursor-pointer cursor-pointer">
                </div>
            </div>

            <!-- ปุ่มกดส่ง -->
            <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white font-medium py-3.5 rounded-xl transition-all duration-200 hover:bg-gray-800 active:scale-[0.99] mt-4 cursor-pointer text-sm tracking-wide">
                ยืนยันการจองคิว
            </button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqcANzXqG_KH8mDGxS7IEz6OEzkn8JsxCsuWjGpZqcDCpkCHOJgLS4_hq4YMObR3H/exec";

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังส่งข้อมูล...';

            Swal.fire({
                title: 'กำลังส่งข้อมูล...',
                text: 'ระบบกำลังบันทึกข้อมูลและอัปโหลดสลิป',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const fileInput = document.getElementById('slip');
            const file = fileInput.files[0];
            
            let slipData = "";
            let slipName = "";
            let slipType = "";

            if (file) {
                slipName = file.name;
                slipType = file.type;
                
                slipData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        resolve(base64String);
                    };
                    reader.readAsDataURL(file);
                });
            }

            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                service: document.getElementById('service').value,
                details: document.getElementById('details').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                deposit: document.getElementById('deposit').value,
                slipData: slipData,
                slipName: slipName,
                slipType: slipType
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(formData),
                mode: 'no-cors'
            })
            .then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'BOOKING SUCCESSFUL',
                    text: 'บันทึกข้อมูลและอัปโหลดสลิปเรียบร้อยแล้ว!',
                    confirmButtonColor: '#111827'
                });
                document.getElementById('bookingForm').reset();
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonColor: '#111827'
                });
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = 'ยืนยันการจองคิว';
            });
        });
    </script>
</body>
</html>
