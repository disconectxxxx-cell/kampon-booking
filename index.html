<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampon Graphics — Booking System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans Thai', -apple-system, sans-serif;
            letter-spacing: -0.2px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.05); }
            50% { box-shadow: 0 0 0 6px rgba(0, 0, 0, 0.03); background-color: #f1f5f9; }
            100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.05); }
        }

        body {
            background-color: #fafafa;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .booking-card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.015);
            border: 1px solid #ebeeef;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #000000;
            margin-bottom: 4px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
        }
        
        .brand-header:hover .brand-logo {
            transform: scale(1.04);
        }

        .brand-subtitle {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-group {
            margin-bottom: 24px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 0px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        select, 
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #ffffff;
            color: #000000;
            outline: none;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.03);
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input[type="file"]:hover {
            border-color: #000000;
            background-color: #fafafa;
        }

        textarea {
            resize: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .btn-submit:active {
            transform: translateY(-0.5px);
        }

        .btn-submit:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            animation: pulseGlow 1.6s infinite ease-in-out;
        }

        .custom-swal-popup {
            border-radius: 16px !important;
            padding: 30px !important;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .custom-swal-title {
            font-size: 22px !important;
            font-weight: 600 !important;
            color: #000000 !important;
        }

        .custom-swal-confirm {
            background-color: #000000 !important;
            border-radius: 8px !important;
            padding: 12px 30px !important;
            font-size: 14px !important;
            transition: all 0.2s ease !important;
        }
        
        .custom-swal-confirm:hover {
            background-color: #222222 !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="brand-header">
        <div class="brand-logo">Kampon Graphics</div>
        <div class="brand-subtitle">Online Booking System</div>
    </div>
    
    <form id="bookingForm" onsubmit="handleFormSubmit(event)">
        <div class="field-group">
            <label class="form-label">ชื่อ - นามสกุล</label>
            <input type="text" id="name" required placeholder="กรุณากรอกชื่อ-นามสกุลของคุณ">
        </div>
        
        <div class="field-group">
            <label class="form-label">เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" required placeholder="08X-XXX-XXXX">
        </div>
        
        <div class="field-group">
            <label class="form-label">ประเภทงานที่ต้องการ</label>
            <select id="service" required>
                <option value="งานปริญญา">งานปริญญา</option>
                <option value="งานแต่ง">งานแต่ง</option>
                <option value="งานบวช">งานบวช</option>
                <option value="งานชุดนักเรียน">งานชุดนักเรียน</option>
                <option value="งานวันเกิด">งานวันเกิด</option>
                <option value="อื่นๆ">อื่นๆ (ระบุในรายละเอียดเพิ่มเติม)</option>
            </select>
        </div>
        
        <div class="field-row">
            <div class="field-group">
                <label class="form-label">วันที่จองคิว</label>
                <input type="date" id="date" required>
            </div>
            <div class="field-group">
                <label class="form-label">เวลา</label>
                <input type="time" id="time" required>
            </div>
        </div>

        <div class="field-group">
            <label class="form-label">จำนวนเงินมัดจำ (บาท)</label>
            <input type="number" id="deposit" min="0" required placeholder="0.00">
        </div>

        <div class="field-group">
            <label class="form-label">แนบหลักฐานการโอนเงิน (สลิป)</label>
            <input type="file" id="slip" accept="image/*" required>
        </div>
        
        <div class="field-group">
            <label class="form-label">รายละเอียดงานเพิ่มเติม</label>
            <textarea id="details" rows="3" placeholder="ระบุบรีฟงาน โทนสี หรือรายละเอียดเพิ่มเติมที่ต้องการ..."></textarea>
        </div>
        
        <button type="submit" id="submitBtn" class="btn-submit">ยืนยันการส่งข้อมูล</button>
    </form>
</div>

<script>
    function handleFormSubmit(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const slipFile = document.getElementById('slip').files[0];
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังบีบอัดสลิปให้ส่งผ่านได้ง่ายขึ้น...';

        // ลิงก์ทองคำหลังบ้าน
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyk7K9QxokJpYQ0jOGdL0_mcrQtcId2ybDnh8uqMcy2kulrPNHjozrsImgPVkk69Rsb/exec"; 

        // ระบบย่อขนาดรูปภาพสลิปอัตโนมัติก่อนส่งไปหลังบ้าน เพื่อป้องกันเออเร่อไฟล์ใหญ่เกินขีดจำกัด
        const reader = new FileReader();
        reader.readAsDataURL(slipFile);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                // ย่อขนาดความกว้าง/สูงสูงสุดให้อยู่ในเกณฑ์ 1000px พอดีคำสำหรับอ่านตัวหนังสือ
                const MAX_SIZE = 1000;
                if (width > height) {
                    if (width > MAX_SIZE) {
                        height *= MAX_SIZE / width;
                        width = MAX_SIZE;
                    }
                } else {
                    if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height;
                        height = MAX_SIZE;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // แปลงไฟล์เป็น JPEG บีบอัดคุณภาพเหลือ 75% ทำให้ไฟล์เบาลงมหาศาล ยิงเข้า Google Script ผ่านฉลุย 100%
                const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
                const base64Data = dataUrl.split(',')[1];
                
                submitBtn.innerText = 'กำลังบันทึกข้อมูลคิวงาน...';

                const formData = {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    service: document.getElementById('service').value,
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    deposit: document.getElementById('deposit').value,
                    details: document.getElementById('details').value,
                    slipData: base64Data,
                    slipName: slipFile.name.replace(/\.[^/.]+$/, "") + ".jpg", // เปลี่ยนนามสกุลให้เป็น jpg
                    slipType: "image/jpeg"
                };

                fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(formData)
                })
                .then(res => res.json())
                .then(response => {
                    if(response.status === "success") {
                        Swal.fire({
                            title: 'BOOKING SUCCESSFUL',
                            text: 'ระบบได้บันทึกข้อมูลคิวงานและหลักฐานสลิปของท่านเรียบร้อยแล้ว ขอบคุณครับ',
                            icon: 'success',
                            customClass: {
                                popup: 'custom-swal-popup',
                                title: 'custom-swal-title',
                                confirmButton: 'custom-swal-confirm'
                            },
                            confirmButtonColor: '#000000',
                            confirmButtonText: 'CLOSE'
                        }).then(() => {
                            document.getElementById('bookingForm').reset();
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'ยืนยันการส่งข้อมูล';
                        });
                    } else {
                        throw new Error(response.message);
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    Swal.fire({
                        title: 'ERROR',
                        text: 'เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง',
                        icon: 'error',
                        confirmButtonColor: '#000000'
                    });
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'ยืนยันการส่งข้อมูล';
                });
            };
        };
        reader.onerror = function (error) {
            console.error("Error reading file:", error);
            submitBtn.disabled = false;
            submitBtn.innerText = 'ยืนยันการส่งข้อมูล';
        };
    }
</script>

</body>
</html>
