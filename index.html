
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kampon Graphics - Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        input[type="date"], select { min-width: 0 !important; width: 100% !important; max-width: 100% !important; -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-5 shadow-sm overflow-hidden box-border">
        <div class="text-center mb-4">
            <h2 class="text-2xl font-semibold text-gray-900 tracking-wide">KAMPON GRAPHICS</h2>
            <p class="text-gray-500 text-xs mt-1">ระบบจองคิวงานและแนบสลิปมัดจำ</p>
        </div>
        <form id="bookingForm" class="space-y-3 block">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">ชื่อ-นามสกุล</label>
                <input type="text" id="name" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500" placeholder="สมชาย ใจดี">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500" placeholder="089XXXXXXX">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">ประเภทงานที่ต้องการสั่ง / ถ่ายภาพ</label>
                <input type="text" id="service" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">รายละเอียดงานเพิ่มเติม</label>
                <textarea id="details" rows="3" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500 resize-none" placeholder="ระบุบรีฟงานเพิ่มเติม..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">วันที่จอง</label>
                    <input type="date" id="date" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">เวลา (บล็อกละ 1 ชม.)</label>
                    <div class="relative">
                        <!-- เปลี่ยนเป็น select เพื่อให้ขึ้นช่วงเวลาตามที่มึงอยากได้เป๊ะๆ มึง -->
                        <select id="timeSlot" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500 cursor-pointer bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236B7280%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.65rem_auto] bg-[right_1rem_center] bg-no-repeat pr-8">
                            <option value="" disabled selected hidden>เลือกเวลาคิว...</option>
                            <option value="09:00">09:00 - 10:00</option>
                            <option value="10:00">10:00 - 11:00</option>
                            <option value="11:00">11:00 - 12:00</option>
                            <option value="12:00">12:00 - 13:00</option>
                            <option value="13:00">13:00 - 14:00</option>
                            <option value="14:00">14:00 - 15:00</option>
                            <option value="15:00">15:00 - 16:00</option>
                            <option value="16:00">16:00 - 17:00</option>
                            <option value="17:00">17:00 - 18:00</option>
                            <option value="18:00">18:00 - 19:00</option>
                            <option value="19:00">19:00 - 20:00</option>
                            <option value="20:00">20:00 - 21:00</option>
                            <option value="21:00">21:00 - 22:00</option>
                            <option value="22:00">22:00 - 23:00</option>
                            <option value="23:00">23:00 - 00:00</option>
                        </select>
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">จำนวนเงินมัดจำ (บาท)</label>
                <input type="number" id="deposit" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-gray-900 focus:outline-none focus:border-gray-500">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">แนบภาพสลิปการโอนเงิน</label>
                <div class="border border-gray-300 border-dashed rounded-xl p-2.5 bg-gray-50">
                    <input type="file" id="slip" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-medium file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 cursor-pointer">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white font-medium py-3 rounded-xl transition-all duration-200 hover:bg-gray-800 active:scale-[0.99] mt-2 cursor-pointer text-sm tracking-wide">ยืนยันการจองคิว</button>
        </form>
    </div>
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxu3YLPLU_qbXTPxUWSNcKSy6_rNgd_kg2KbQoHD6ZpiToxXgFyNmXX9IBWMOJPScWl/exec";

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังส่งข้อมูล...';
            
            Swal.fire({ title: 'กำลังส่งข้อมูล...', text: 'ระบบกำลังส่งข้อมูลและอัปโหลดสลิป', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            const fileInput = document.getElementById('slip');
            const file = fileInput.files[0];
            let slipData = "", slipName = "", slipType = "";
            if (file) {
                slipName = file.name;
                slipType = file.type;
                slipData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
            }

            const inputTime = document.getElementById('timeSlot').value; // จะได้ค่าเช่น "23:00" ไปส่งหลังบ้าน
            const inputDate = document.getElementById('date').value;
            
            // ดึงข้อความช่วงเวลาที่เลือกมาโชว์บน SweetAlert (เช่น "23:00 - 00:00")
            const selectEl = document.getElementById('timeSlot');
            const timeRangeText = selectEl.options[selectEl.selectedIndex].text;

            const params = new URLSearchParams();
            params.append('name', document.getElementById('name').value);
            params.append('phone', document.getElementById('phone').value);
            params.append('service', document.getElementById('service').value);
            params.append('details', document.getElementById('details').value);
            params.append('date', inputDate);
            params.append('time', inputTime);
            params.append('deposit', document.getElementById('deposit').value);
            params.append('slipData', slipData);
            params.append('slipName', slipName);
            params.append('slipType', slipType);

            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() })
            .then(() => {
                Swal.fire({ 
                    icon: 'success', 
                    title: 'BOOKING SUCCESSFUL', 
                    html: `ส่งข้อมูลการจองคิวเรียบร้อยแล้ว!<br><br><span style="font-size: 15px; color: #4B5563;">ช่วงเวลาคิวของมึงคือ:</span><br><b style="font-size: 24px; color: #10B981;">${timeRangeText} น.</b>`, 
                    confirmButtonColor: '#111827' 
                });
                document.getElementById('bookingForm').reset();
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถติดต่อระบบหลังบ้านได้', confirmButtonColor: '#111827' });
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = 'ยืนยันการจองคิว';
            });
        });
    </script>
</body>
</html>
